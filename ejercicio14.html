<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14 - Duplicar Arreglo</title>
</head>
<body>
    <script>
      
        function duplicar(arreglo) {
            let nuevoArreglo = [];
            for (let i = 0; i < arreglo.length; i++) {
                nuevoArreglo.push(arreglo[i] * 2);
            }
            return nuevoArreglo;
        }

      
        let cantidad = parseInt(prompt("¿Cuántos números deseas almacenar en el arreglo?"));
        let numerosOriginales = [];

       
        if (!isNaN(cantidad) && cantidad > 0) {
            
           
            for (let i = 0; i < cantidad; i++) {
               
                let numeroIngresado = parseFloat(prompt(`Ingrese el número ${i + 1} de ${cantidad}:`));
                numerosOriginales.push(numeroIngresado);
            }

           
            let numerosDuplicados = duplicar(numerosOriginales);

            
            document.write(`
                <h2>Resultado del Ejercicio </h2>
                <p><strong>Cantidad de elementos:</strong> ${cantidad}</p>
                <p><strong>Arreglo original ingresado:</strong> [${numerosOriginales.join(', ')}]</p>
                <p><strong>Nuevo arreglo duplicado:</strong> [${numerosDuplicados.join(', ')}]</p>
            `);

        } else {
            
            document.write(`
                <h2>Error</h2>
                <p>Debes ingresar una cantidad válida mayor a cero. Por favor, recarga la página e intenta de nuevo.</p>
            `);
        }
    </script>
</body>
</html>
