<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 18 - Calcular Mayor</title>
</head>
<body>
    
    <script>
        
        function calcularMayor(numero1, numero2) {
            let mensaje;

            if (numero1 > numero2) {
                mensaje = `El primer número (<strong>${numero1}</strong>) es mayor que el segundo (<strong>${numero2}</strong>).`;
            } else if (numero2 > numero1) {
                mensaje = `El segundo número (<strong>${numero2}</strong>) es mayor que el primero (<strong>${numero1}</strong>).`;
            } else {
                mensaje = `Ambos números son iguales (<strong>${numero1}</strong> = <strong>${numero2}</strong>).`;
            }

           
            document.write(`<p>${mensaje}</p>`);
        }

        
        let n1 = parseFloat(prompt("Ingrese el primer número:"));
        let n2 = parseFloat(prompt("Ingrese el segundo número:"));

        
        document.write(`<h2>Resultado del Ejercicio :</h2>`);

        
        if (!isNaN(n1) && !isNaN(n2)) {
            calcularMayor(n1, n2);
        } else {
            document.write(`<p>Error: Por favor ingrese valores numéricos válidos.</p>`);
        }
    </script>

</body>
</html>
