<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 20</title>
    <style>
        body {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .contenedor {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        h2 {
            text-align: center;
            color: #1f2937;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #1f2937;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
            box-sizing: border-box;
        }

        input:focus {
            outline: 2px solid #2563eb;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>Datos del Alumno</h2>

        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" placeholder="Ingresá tu nombre">

        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" placeholder="Ingresá tu apellido">

        <label for="libreta">Libreta Universitaria:</label>
        <input type="text" id="libreta" placeholder="Ej: APU123456">

        <button id="btnMostrar">Mostrar datos</button>
    </div>

    <script>
        const btn = document.querySelector("#btnMostrar");

        btn.addEventListener("click", () => {
            const nombre = document.querySelector("#nombre").value;
            const apellido = document.querySelector("#apellido").value;
            const libreta = document.querySelector("#libreta").value;

            alert(`Los datos ingresados son:\nNombre: ${nombre}\nApellido: ${apellido}\nLibreta Universitaria: ${libreta}`);
        });
    </script>

</body>
</html>
