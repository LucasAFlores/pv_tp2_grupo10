<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 24</title>
    <link rel="stylesheet" href="ejercicio24.css">
</head>
<body>

    <div class="container">
        <header>
            <h2>Configuración</h2>
            <p>Seleccioná tu lenguaje de programación</p>
        </header>

        <form id="formulario">
            <label class="card-radio">
                <input type="radio" name="lenguaje" value="JavaScript">
                <span class="title">JavaScript</span>
            </label>

            <label class="card-radio">
                <input type="radio" name="lenguaje" value="C++">
                <span class="title">C++</span>
            </label>

            <label class="card-radio">
                <input type="radio" name="lenguaje" value="Python">
                <span class="title">Python</span>
            </label>
        </form>

        <div id="resultado" class="feedback-area"></div>
    </div>

    <script src="ejercicio24.js"></script>
</body>
</html>
